    <script>

        const allQuestions = [
            {q: "1. ¿En qué año del reinado de Belsasar tuvo Daniel la visión del carnero y el macho cabrío? Daniel 8:1", o: ["En el año tercero del reinado del rey Belsasar", "En el primer año del reinado del rey Belsasar", "En el segundo año del reinado del rey Darío", "En el primer año del reinado de Ciro"], c: "En el año tercero del reinado del rey Belsasar"},

            {q: "4. ¿En qué provincia estaba Susa? Daniel 8:2", o: ["En la provincia de Elam", "En la provincia de Judá", "En la provincia de Babilonia", "En la provincia de Media"], c: "En la provincia de Elam"},

            {q: "27. ¿Qué salió de uno de esos cuernos? Daniel 8:9", o: ["Un cuerno pequeño", "Un ejército", "Un rey justo", "Una estrella"], c: "Un cuerno pequeño"},

            {q: "31. ¿Contra quién se engrandeció el cuerno pequeño? Daniel 8:11", o: ["Contra el Príncipe de los ejércitos", "Contra Daniel", "Contra el rey de Persia", "Contra Gabriel"], c: "Contra el Príncipe de los ejércitos"},

            {q: "38. ¿Qué preguntó uno de los santos? Daniel 8:13", o: ["¿Hasta cuándo durará la visión?", "¿Quién es Daniel?", "¿Cuándo vendrá el Mesías?", "¿Dónde está Babilonia?"], c: "¿Hasta cuándo durará la visión?"},

            {q: "41. ¿Hasta cuántas tardes y mañanas duraría la visión? Daniel 8:14", o: ["Hasta dos mil trescientas tardes y mañanas", "Hasta mil doscientas tardes y mañanas", "Hasta setecientas tardes y mañanas", "Hasta tres mil tardes y mañanas"], c: "Hasta dos mil trescientas tardes y mañanas"},

        let questions = [], currentQuestion = 0, selectedAnswer = null, score = 0;

        function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function initQuiz() {
            questions = shuffleArray(allQuestions).map(q => ({
                question: q.q,
                shuffledOptions: shuffleArray(q.o),
                correctAnswer: q.c
            }));
            currentQuestion = 0;
            selectedAnswer = null;
            score = 0;
            document.getElementById('quiz-content').style.display = 'block';
            document.getElementById('result-content').style.display = 'none';
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('question-text').textContent = q.question;
            document.getElementById('progress-text').textContent = `Pregunta ${currentQuestion + 1} de ${questions.length}`;
            document.getElementById('score-text').textContent = `Puntaje: ${score}/${currentQuestion}`;
            document.getElementById('progress-fill').style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.onclick = () => selectAnswer(opt);
                const txt = document.createElement('span');
                txt.className = 'option-text';
                txt.textContent = opt;
                btn.appendChild(txt);
                container.appendChild(btn);
            });
            document.getElementById('next-btn').style.display = 'none';
            selectedAnswer = null;
        }

        function selectAnswer(ans) {
            if (selectedAnswer !== null) return;
            selectedAnswer = ans;
            const q = questions[currentQuestion];
            const isCorrect = ans === q.correctAnswer;
            if (isCorrect) score++;
            
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.add('disabled');
                const optTxt = opt.querySelector('.option-text').textContent;
                if (optTxt === q.correctAnswer) {
                    opt.classList.add('correct');
                    const icon = document.createElement('span');
                    icon.className = 'option-icon';
                    icon.textContent = '✓';
                    opt.appendChild(icon);
                } else if (optTxt === ans && !isCorrect) {
                    opt.classList.add('incorrect');
                    const icon = document.createElement('span');
                    icon.className = 'option-icon';
                    icon.textContent = '✗';
                    opt.appendChild(icon);
                }
            });
            
            document.getElementById('score-text').textContent = `Puntaje: ${score}/${currentQuestion + 1}`;
            document.getElementById('next-btn').style.display = 'block';
        }

        document.getElementById('next-btn').onclick = function() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                showQuestion();
            } else {
                showResults();
            }
        };

        document.getElementById('restart-btn').onclick = initQuiz;

        function showResults() {
            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('result-content').style.display = 'block';
            document.getElementById('final-score').textContent = `${score}/${questions.length}`;
            let msg = '';
            if (score === questions.length) {
                msg = '¡Perfecto! Excelente conocimiento';
            } else if (score >= questions.length * 0.8) {
                msg = '¡Muy bien! Buen conocimiento';
            } else if (score >= questions.length * 0.6) {
                msg = 'Bien, pero puedes mejorar';
            } else {
                msg = 'Necesitas estudiar más los capítulos';
            }
            document.getElementById('result-message').textContent = msg;
        }

        initQuiz();
    </script>
</body>
</html>
