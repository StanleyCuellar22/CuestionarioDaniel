            {q: "78. ¿Quiénes lo seguirán en sus pasos? (Daniel 11:43)", o: ["Los de Libia y de Etiopía", "Los de Libia y de Egipto", "Los de Etiopía y de Egipto", "Los de Libia y de Arabia"], c: "Los de Libia y de Etiopía"},
            {q: "79. ¿Qué lo atemorizará? (Daniel 11:44)", o: ["Noticias del oriente y del norte", "Noticias del norte y del sur", "Rumores de guerra", "Señales del cielo"], c: "Noticias del oriente y del norte"},
            {q: "80. ¿Qué hará cuando sea atemorizado por las noticias del oriente y del norte? (Daniel 11:44)", o: ["Saldrá con gran ira para destruir y matar a muchos", "Saldrá con gran poder para destruir", "Entre los mares y el monte glorioso", "Entre los mares y el monte del templo"], c: "Saldrá con gran ira para destruir y matar a muchos"},
            {q: "82. ¿Dónde plantará las tiendas de su palacio? (Daniel 11:45)", o: ["Entre los mares y el monte glorioso y santo", "En Jerusalén", "En el valle", "Junto al río"], c: "Entre los mares y el monte glorioso y santo"},
            {q: "83. ¿Qué ocurrirá con el finalmente? (Daniel 11:45)", o: ["Llegará a su fin", "Gobernará para siempre", "Huirá", "Se arrepentirá"], c: "Llegará a su fin"},
            {q: "84. ¿Que no tendra cuando llegue a su fin? (Daniel 11:45)", o: ["Quien le ayude", "Quien lo socorra", "Quien lo acompañe", "Sus tropas"], c: "Quien le ayude"},
            {q: "86. ¿Que se levantara luego de los reyes de persia? (Daniel 11:3)", o: ["Un rey valiente", "Un rey poderoso", "Un rey fuerte", "Un rey grande"], c: "Un rey valiente"},
            {q: "94. ¿Como dominara ese rey? (Daniel 11:3)", o: ["Con gran poder", "Con gran ejército", "Con gran fuerza", "Con gran autoridad"], c: "Con gran poder"},
            {q: "95. ¿Que hara ese rey segun el texto? (Daniel 11:3)", o: ["UHará su voluntad", "Hará su proposito", "Sera Dividido", "Sera deshecho"], c: "Hará su voluntad"},
            {q: "95. ¿Quién se levantará sobre su trono? (Daniel 11:7)", o: ["Un renuevo de sus raíces", "Un heredero del reino", "Un príncipe poderoso", "Un hijo del rey"], c: "Un renuevo de sus raíces"},
            {q: "96. ¿Contra quién vendrá con un ejército? (Daniel 11:7)", o: ["Contra el rey del norte", "Contra el rey del sur", "Contra el rey poderoso", "Contra el rey enemigo"], c: "Contra el rey del norte"},
            {q: "97. ¿Dónde entrará ese renuevo? (Daniel 11:7)", o: ["En la fortaleza", "En la ciudad", "En el templo", "En el palacio"], c: "En la fortaleza"},
            {q: "98. ¿Qué hará con ellos? (Daniel 11:7)", o: ["Hará en ellos a su arbitrio", "Hará con ellos pacto", "Hará con ellos guerra", "Hará con ellos alianza"], c: "Hará en ellos a su arbitrio"},
            {q: "99. ¿Qué llevará cautivo a Egipto? (Daniel 11:8)", o: ["Sus dioses, sus imágenes fundidas y sus objetos preciosos de plata y de oro", "A los reyes", "A las mujeres", "A los niños"], c: "Sus dioses, sus imágenes fundidas y sus objetos preciosos de plata y de oro"}
];
        let questions = [], currentQuestion = 0, selectedAnswer = null, score = 0;

        function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function initQuiz() {
            questions = shuffleArray(allQuestions).map(q => ({
                question: q.q,
                shuffledOptions: shuffleArray(q.o),
                correctAnswer: q.c
            }));
            currentQuestion = 0;
            selectedAnswer = null;
            score = 0;
            document.getElementById('quiz-content').style.display = 'block';
            document.getElementById('result-content').style.display = 'none';
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('question-text').textContent = q.question;
            document.getElementById('progress-text').textContent = `Pregunta ${currentQuestion + 1} de ${questions.length}`;
            document.getElementById('score-text').textContent = `Puntaje: ${score}/${currentQuestion}`;
            document.getElementById('progress-fill').style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.onclick = () => selectAnswer(opt);
                const txt = document.createElement('span');
                txt.className = 'option-text';
                txt.textContent = opt;
                btn.appendChild(txt);
                container.appendChild(btn);
            });
            document.getElementById('next-btn').style.display = 'none';
            selectedAnswer = null;
        }

        function selectAnswer(ans) {
            if (selectedAnswer !== null) return;
            selectedAnswer = ans;
            const q = questions[currentQuestion];
            const isCorrect = ans === q.correctAnswer;
            if (isCorrect) score++;
            
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.add('disabled');
                const optTxt = opt.querySelector('.option-text').textContent;
                if (optTxt === q.correctAnswer) {
                    opt.classList.add('correct');
                    const icon = document.createElement('span');
                    icon.className = 'option-icon';
                    icon.textContent = '✓';
                    opt.appendChild(icon);
                } else if (optTxt === ans && !isCorrect) {
                    opt.classList.add('incorrect');
                    const icon = document.createElement('span');
                    icon.className = 'option-icon';
                    icon.textContent = '✗';
                    opt.appendChild(icon);
                }
            });
            
            document.getElementById('score-text').textContent = `Puntaje: ${score}/${currentQuestion + 1}`;
            document.getElementById('next-btn').style.display = 'block';
        }

        document.getElementById('next-btn').onclick = function() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                showQuestion();
            } else {
                showResults();
            }
        };

        document.getElementById('restart-btn').onclick = initQuiz;

        function showResults() {
            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('result-content').style.display = 'block';
            document.getElementById('final-score').textContent = `${score}/${questions.length}`;
            let msg = '';
            if (score === questions.length) {
                msg = '¡Perfecto! Excelente conocimiento';
            } else if (score >= questions.length * 0.8) {
                msg = '¡Muy bien! Buen conocimiento';
            } else if (score >= questions.length * 0.6) {
                msg = 'Bien, pero puedes mejorar';
            } else {
                msg = 'Necesitas estudiar más los capítulos';
            }
            document.getElementById('result-message').textContent = msg;
        }

        initQuiz();
    </script>
</body>
